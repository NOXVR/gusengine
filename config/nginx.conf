worker_processes auto;
events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 100M;  # For large PDF uploads

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    server {
        listen 80;
        server_name localhost;

        # Serve React frontend
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # Proxy API requests to GusEngine backend
        location /api/ {
            proxy_pass http://gusengine:8888;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 120s;  # LLM inference can be slow
        }

        # Serve PDFs for citation viewer
        location /pdfs/ {
            alias /usr/share/nginx/pdfs/;
            add_header Content-Type application/pdf;
        }
    }
}
