# =============================================================================
# GusEngine V10 — Docker Compose (Non-RunPod Deployments)
#
# Usage:
#   docker compose up -d
#   docker compose logs -f backend
#   docker compose down
#
# Prerequisites:
#   - Copy .env.template to .env and set LLM_API_KEY
#   - Place BGE-M3 model in ./storage/models/bge-m3/
#   - Place PDFs in ./storage/pdfs/
#   - Qdrant data in ./storage/qdrant/ (or ingest fresh)
# =============================================================================

services:
  # --- Qdrant Vector Database ---
  qdrant:
    image: qdrant/qdrant:v1.12.4
    ports:
      - "6333:6333"
    volumes:
      - ./storage/qdrant:/qdrant/storage
    environment:
      - QDRANT__STORAGE__STORAGE_PATH=/qdrant/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # --- BGE-M3 Embedding Server ---
  embedding:
    build:
      context: .
      dockerfile: Dockerfile.embedding
    ports:
      - "8080:8080"
    volumes:
      - ./storage/models/bge-m3:/models/bge-m3:ro
    environment:
      - BGE_M3_MODEL_PATH=/models/bge-m3
      - TEI_PORT=8080
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 45s
    depends_on:
      qdrant:
        condition: service_healthy

  # --- FastAPI Backend ---
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8888:8888"
    volumes:
      - ./storage/pdfs:/app/storage/pdfs:ro
      - ./config:/app/config:ro
      - ./frontend:/app/frontend:ro
    env_file:
      - .env
    environment:
      - VLLM_BASE_URL=https://generativelanguage.googleapis.com/v1beta/openai
      - VLLM_MODEL=gemini-2.5-flash
      - QDRANT_URL=http://qdrant:6333
      - TEI_BASE_URL=http://embedding:8080
      - EMBEDDING_URL=http://embedding:8080
      - TOKENIZER_MODEL_PATH=/app/storage/models/tokenizer
      - SYSTEM_PROMPT_PATH=/app/config/system_prompt.txt
      - SYSTEM_PROMPT_TOKENS=1800
      - MAX_CONTEXT_TOKENS=32768
      - RESPONSE_BUDGET_TOKENS=8192
      - LEDGER_MAX_TOKENS=2550
      - ALLOWED_PDF_DIR=/app/storage/pdfs
      - LEDGER_PATH=/app/config/MASTER_LEDGER.md
      - HF_HUB_OFFLINE=1
      - TRANSFORMERS_OFFLINE=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      qdrant:
        condition: service_healthy
      embedding:
        condition: service_healthy
