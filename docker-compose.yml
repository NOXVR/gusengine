# =============================================================================
# GusEngine V10 — Docker Compose (Production)
#
# Self-contained deployment:
#   - Models download automatically during build
#   - Qdrant data restores from backup on first boot
#   - Only requirement: set LLM_API_KEY in .env
#
# Usage:
#   cp .env.template .env && echo "LLM_API_KEY=your-key" > .env
#   docker compose up -d
#   docker compose logs -f
# =============================================================================

services:
  # --- Qdrant Vector Database ---
  qdrant:
    image: qdrant/qdrant:v1.12.4
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:6333/healthz" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # --- BGE-M3 Embedding Server ---
  embedding:
    build:
      context: .
      dockerfile: Dockerfile.embedding
    ports:
      - "8080:8080"
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/health" ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 120s
    depends_on:
      qdrant:
        condition: service_healthy

  # --- FastAPI Backend ---
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8888:8888"
    env_file:
      - .env
    environment:
      - VLLM_BASE_URL=https://generativelanguage.googleapis.com/v1beta/openai
      - VLLM_MODEL=gemini-2.5-flash
      - QDRANT_URL=http://qdrant:6333
      - TEI_BASE_URL=http://embedding:8080
      - EMBEDDING_URL=http://embedding:8080
      - TOKENIZER_MODEL_PATH=Qwen/Qwen2.5-32B-Instruct-AWQ
      - SYSTEM_PROMPT_PATH=/app/config/system_prompt.txt
      - SYSTEM_PROMPT_TOKENS=1800
      - MAX_CONTEXT_TOKENS=32768
      - RESPONSE_BUDGET_TOKENS=8192
      - LEDGER_MAX_TOKENS=2550
      - ALLOWED_PDF_DIR=/app/storage/pdfs
      - LEDGER_PATH=/app/config/MASTER_LEDGER.md
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8888/api/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      qdrant:
        condition: service_healthy
      embedding:
        condition: service_healthy

volumes:
  qdrant_data:
