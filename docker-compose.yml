# docker-compose.yml — GusEngine V10 PROTOTYPE (RunPod A100 80GB)
# Pre-requisite: RunPod pod with A100 80GB GPU
# Pre-requisite: Download models to ./storage/models/ before first launch

# AUDIT FIX (P10-19): Removed deprecated 'version: "3.8"'

services:
  # ─── LLM Inference (vLLM) ───
  vllm:
    # AUDIT FIX (P9-07): Pin to tested version
    image: vllm/vllm-openai:v0.7.2
    container_name: gus_vllm
    restart: always
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./storage/models:/models:ro
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
    command: >
      --model /models/Qwen2.5-32B-Instruct-AWQ --quantization awq_marlin --dtype float16 --tensor-parallel-size 1 --max-model-len 32768 --gpu-memory-utilization 0.60 --port 8000 --served-model-name Qwen2.5-32B-Instruct-AWQ --trust-remote-code --disable-log-requests
    networks:
      - gus_internal
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf http://localhost:8000/v1/models || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  # ─── Embedding Server (TEI) ───
  tei:
    image: ghcr.io/huggingface/text-embeddings-inference:1.5.0
    container_name: gus_tei
    restart: always
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - ./storage/models/bge-m3:/model:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
    environment:
      - NVIDIA_VISIBLE_DEVICES=0
    command: --model-id /model --port 80
    networks:
      - gus_internal
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf http://localhost:80/health || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  # ─── Vector Store (Qdrant) ───
  qdrant:
    image: qdrant/qdrant:v1.15.2
    container_name: gus_qdrant
    restart: always
    ports:
      - "127.0.0.1:6333:6333"
    volumes:
      - ./storage/qdrant:/qdrant/storage
      - ./storage/snapshots:/qdrant/snapshots
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    networks:
      - gus_internal
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf http://localhost:6333/healthz || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  # ─── GusEngine Backend (FastAPI) ───
  gusengine:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gus_backend
    restart: always
    ports:
      - "127.0.0.1:8888:8888"
    volumes:
      - ./storage/pdfs:/app/pdfs:ro
      - ./storage/extracted:/app/extracted
      - ./config:/app/config:ro
      - ./storage/models:/app/models:ro
      - ./storage/easyocr_models:/app/.EasyOCR/model:ro
    environment:
      - VLLM_BASE_URL=http://vllm:8000/v1
      - TEI_BASE_URL=http://tei:80
      - QDRANT_URL=http://qdrant:6333
      - EASYOCR_MODULE_PATH=/app/.EasyOCR
      - VLLM_MODEL=Qwen2.5-32B-Instruct-AWQ
      - MAX_CONTEXT_TOKENS=32768
      - SYSTEM_PROMPT_TOKENS=900
      - RESPONSE_BUDGET_TOKENS=2000
      - LEDGER_MAX_TOKENS=2550
      - HF_HUB_OFFLINE=1
      - TRANSFORMERS_OFFLINE=1
    depends_on:
      vllm:
        condition: service_healthy
      tei:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    networks:
      - gus_internal
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf http://localhost:8888/api/health || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 360s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  # ─── Frontend (React + Nginx) ───
  # PROTOTYPE: HTTP-only for RunPod (no TLS certs yet)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gus_frontend
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./storage/pdfs:/usr/share/nginx/pdfs:ro
      - ./config/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      gusengine:
        condition: service_healthy
    networks:
      - gus_internal
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf http://localhost:80/ || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

networks:
  gus_internal:
    driver: bridge
    internal: true # Air-gap enforcement — blocks container egress
